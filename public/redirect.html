<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网站迁移提示</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
        }
        .container {
            background: white;
            padding: 40px 50px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #1a1a1a;
        }
        p {
            font-size: 16px;
            color: #666;
            margin: 16px 0;
            line-height: 1.6;
        }
        .timer {
            font-size: 14px;
            color: #999;
            margin-top: 20px;
        }
        a {
            color: #0066cc;
            text-decoration: none;
            font-weight: 500;
        }
        a:hover {
            text-decoration: underline;
        }
        /* 简单的加载动画（可选） */
        .dot-pulse {
            display: inline-block;
            margin-top: 10px;
        }
        .dot-pulse::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🚀 网站升级啦！</h1>
    <p>
        本站已正式迁移至 <strong>blog.hanerson.com</strong>。<br>
        新域名更专业，访问更稳定。
    </p>
    <p id="countdown" class="timer">
        <span id="seconds">3</span> 秒后自动跳转...
    </p>
    <p style="margin-top: 20px; font-size: 14px;">
        若未自动跳转，请点击 <a href="https://blog.hanerson.com">这里</a> 立即访问。
    </p>
    <div class="dot-pulse"></div>
</div>

<script>
    // ===== 配置区 =====
    const TARGET_URL = 'https://blog.hanerson.com';  // 你的新域名
    const DELAY_SECONDS = 3;                    // 等待秒数，可以改成3或4
    // =================

    let secondsLeft = DELAY_SECONDS;
    const secondsSpan = document.getElementById('seconds');

    // 每秒更新倒计时
    const timer = setInterval(() => {
        secondsLeft -= 1;
        if (secondsSpan) {
            secondsSpan.textContent = secondsLeft;
        }
        if (secondsLeft <= 0) {
            clearInterval(timer);
            // 时间到，跳转
            window.location.href = TARGET_URL;
        }
    }, 1000);

    // 为防止用户点击“后退”按钮时又重新开始计时，可加一个小优化
    // 如果用户点击了手动链接，就不需要额外操作了
</script>
</body>
</html>
